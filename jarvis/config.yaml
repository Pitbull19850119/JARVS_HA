name: "JARVIS"
description: "Just A Rather Very Intelligent System – Iron Man AI für Home Assistant (Gemini Pro)"
version: "5.3.0"
slug: "jarvis"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
startup: application
boot: auto
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: "JARVIS Web Interface"
options:
  ha_token: ""
  ha_url: "http://homeassistant:8123"
  gemini_api_key: ""
  gemini_model: "gemini-2.5-pro"
  log_level: "info"
schema:
  ha_token: str
  ha_url: str
  gemini_api_key: str?
  gemini_model: list(gemini-2.5-pro|gemini-2.5-flash|gemini-1.5-pro|gemini-1.5-flash)
  log_level: list(debug|info|warning|error)
panel_icon: mdi:robot
panel_title: JARVIS
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8766
map:
  - data:rw
